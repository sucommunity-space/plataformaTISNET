services:
  - type: web
    name: TISNET
    runtime: python
    plan: free
    region: ohio
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements-render.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /api/system/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: FLASK_HOST
        value: 0.0.0.0
      - key: FLASK_PORT
        value: 10000
      - key: FLASK_DEBUG
        value: "false"
      - key: ENABLE_DEMO_LOGIN
        value: "false"
      - key: ENABLE_SAMPLE_DATA
        value: "false"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: OWNER_ADMIN_NAME
        value: Administrador Principal TISNET
      - key: OWNER_ADMIN_EMAIL
        value: admin@tisnet.pe
      - key: OWNER_ADMIN_PASSWORD
        sync: false
      - key: OWNER_ADMIN_COMPANY
        value: TISNET
      - key: OWNER_ADMIN_WEBSITE
        value: https://tisnet.pe
      - key: OWNER_ADMIN_PHONE
        value: +51999999999
      - key: OWNER_SALES_NAME
        value: Ejecutivo Comercial TISNET
      - key: OWNER_SALES_EMAIL
        value: ventas@tisnet.pe
      - key: OWNER_SALES_PASSWORD
        sync: false
      - key: OWNER_SALES_COMPANY
        value: TISNET
      - key: OWNER_SALES_WEBSITE
        value: https://tisnet.pe
      - key: OWNER_SALES_PHONE
        value: +51999999999
      - key: CALENDLY_PUBLIC_URL
        sync: false
      - key: CALENDLY_CLIENT_REVIEW_URL
        sync: false
      - key: CALENDLY_CLIENT_CLOSE_URL
        sync: false
      - key: CALENDLY_PERSONAL_ACCESS_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: TISNET
      - key: DATABASE_URL
        fromDatabase:
          name: tisnet-db
          property: connectionString
      - key: POSTGRES_DATABASE
        fromDatabase:
          name: tisnet-db
          property: database
      - key: POSTGRES_ADMIN_DATABASE
        value: postgres

databases:
  - name: tisnet-db
    plan: free
    region: ohio
    postgresMajorVersion: "17"
    databaseName: tisnet_db
    user: tisnet
